<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent — Josh Strohm</title>
  <meta name="description" content="Message sent successfully.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="joshstrohm.jpg" type="image/jpeg">
  <meta property="og:image" content="https://theurl.site/joshstrohm.jpg">
  <meta name="twitter:image" content="https://theurl.site/joshstrohm.jpg">

  <style>
    .success-wrapper {
      max-width: 480px;
      margin: 0 auto;
      padding: 80px 24px;
      text-align: center;
    }
    .success-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      background: var(--bg-card);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .success-icon svg {
      width: 32px;
      height: 32px;
      color: var(--success, #10b981);
    }
    .success-wrapper h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .success-wrapper p {
      color: var(--text-secondary);
      font-size: 0.9375rem;
      margin-bottom: 24px;
    }
    .success-timer {
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    .success-back {
      display: inline-block;
      margin-top: 16px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.875rem;
    }
    .success-back:hover {
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="success-wrapper">
    <div class="success-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1>Message Sent!</h1>
    <p>Thanks for reaching out. I'll get back to you soon.</p>
    <p class="success-timer">Redirecting to main page in <span id="countdown">5</span> seconds...</p>
    <a href="josh-strohm.html" class="success-back">Go back now</a>
  </main>

  <script>
    let countdown = 5;
    const countdownEl = document.getElementById('countdown');
    
    const interval = setInterval(() => {
      countdown--;
      countdownEl.textContent = countdown;
      
      if (countdown <= 0) {
        clearInterval(interval);
        window.location.href = 'josh-strohm.html';
      }
    }, 1000);
  </script>
</body>
</html>
