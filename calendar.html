<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book a Call — Josh Strohm</title>
  <meta name="description" content="Schedule a call with Josh Strohm.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="joshstrohm.jpg" type="image/jpeg">
  <meta property="og:image" content="https://theurl.site/joshstrohm.jpg">
  <meta name="twitter:image" content="https://theurl.site/joshstrohm.jpg">

  <style>
    .calendar-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 24px;
    }
    .calendar-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .calendar-header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .calendar-header p {
      color: var(--text-secondary);
      font-size: 0.9375rem;
    }
    .calendar-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.875rem;
      margin-bottom: 24px;
      transition: color 0.2s ease;
    }
    .calendar-back:hover {
      color: var(--text);
    }
    .calendar-embed {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .calendar-embed iframe {
      display: block;
      width: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <main class="calendar-wrapper">
    <a href="josh-strohm.html" class="calendar-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back to profile
    </a>

    <div class="calendar-header">
      <h1>Book a Call</h1>
      <p>Select a time that works for you</p>
    </div>

    <div class="calendar-embed">
      <!-- Google Calendar Appointment Scheduling begin -->
      <iframe src="https://calendar.google.com/calendar/appointments/schedules/AcZssZ2lnFVDVF4oKIzE6ZHDeeyE7cLSIGsE79nUYZPvsPWxz8a6Do7nJDVXq1uwyqJVtig3pMaB3tg7?gv=true" style="border: 0" width="100%" height="600" frameborder="0"></iframe>
      <!-- end Google Calendar Appointment Scheduling -->
    </div>
  </main>
</body>
</html>
