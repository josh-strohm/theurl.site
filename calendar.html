<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book a Call — Josh Strohm</title>
  <meta name="description" content="Schedule a call with Josh Strohm.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="joshstrohm.jpg" type="image/jpeg">
  <meta property="og:image" content="https://theurl.site/joshstrohm.jpg">
  <meta name="twitter:image" content="https://theurl.site/joshstrohm.jpg">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --bg-elevated: #141414;
      --bg-card: #1a1a1a;
      --border: #2a2a2a;
      --border-light: #333333;
      --text: #fafafa;
      --text-secondary: #888888;
      --text-muted: #555555;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .calendar-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .calendar-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.875rem;
      margin-bottom: 24px;
      transition: color 0.2s ease;
    }

    .calendar-back:hover {
      color: var(--text);
    }

    .calendar-back svg {
      width: 16px;
      height: 16px;
    }

    .calendar-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .calendar-header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .calendar-header p {
      color: var(--text-secondary);
      font-size: 0.9375rem;
    }

    .calendar-embed {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .calendar-embed iframe {
      display: block;
      width: 100%;
      border: none;
      min-height: 600px;
      background: #ffffff;
    }

    @media (max-width: 480px) {
      .calendar-wrapper {
        padding: 24px 16px;
      }
    }
  </style>
</head>
<body>
  <main class="calendar-wrapper">
    <a href="josh-strohm.html" class="calendar-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back to profile
    </a>

    <div class="calendar-header">
      <h1>Book a Call</h1>
      <p>Select a time that works for you</p>
    </div>

    <div class="calendar-embed">
      <iframe src="https://calendar.google.com/calendar/appointments/schedules/AcZssZ2lnFVDVF4oKIzE6ZHDeeyE7cLSIGsE79nUYZPvsPWxz8a6Do7nJDVXq1uwyqJVtig3pMaB3tg7?gv=true" style="border: 0" width="100%" height="600" frameborder="0"></iframe>
    </div>
  </main>
</body>
</html>
